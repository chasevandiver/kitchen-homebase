<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Kitchen Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#080808;--c1:#111;--c2:#181818;--c3:#222;--c4:#2a2a2a;
  --sep:rgba(255,255,255,0.07);
  --t1:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.28);--t4:rgba(255,255,255,.11);
  --gold:#c8a84b;--green:#34c759;--red:#ff453a;--orange:#ff9500;--blue:#4facfe;--purple:#bf5af2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,'SF Pro Text','Outfit',sans-serif;min-height:100dvh;-webkit-font-smoothing:antialiased}

/* ── TOP BAR ── */
#topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,8,.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--sep);
  padding:env(safe-area-inset-top,12px) 16px 0;
}
#topbar-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;}
#app-title{font-size:20px;font-weight:800;letter-spacing:-.3px;}
#app-title span{color:var(--gold)}
#sync-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);font-weight:600;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--c4)}
.sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.syn{background:var(--gold);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TABS ── */
#tabs{display:flex;gap:4px;padding-bottom:12px;}
.tab{
  flex:1;padding:9px 6px;border-radius:12px;border:none;
  font-family:inherit;font-size:13px;font-weight:700;
  background:var(--c2);color:var(--t3);cursor:pointer;
  transition:all .18s;min-height:44px;
}
.tab.on{background:var(--gold);color:#000}
.tab-bdg{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.2);border-radius:20px;
  font-size:10px;font-weight:800;padding:0 5px;height:16px;
  margin-left:4px;min-width:16px;
}
.tab.on .tab-bdg{background:rgba(0,0,0,.25);color:rgba(0,0,0,.7)}
.tab:not(.on) .tab-bdg{background:var(--c3);color:var(--t3)}

/* ── SHARED ── */
.inp{background:var(--c2);border:1px solid transparent;border-radius:14px;
  color:var(--t1);font-family:inherit;font-size:16px;padding:11px 14px;outline:none;
  transition:border-color .15s,background .15s;-webkit-appearance:none;}
.inp:focus{border-color:var(--gold);background:var(--c3)}
.inp::placeholder{color:var(--t3)}
select.inp{cursor:pointer}
.btn{background:var(--gold);border:none;border-radius:12px;color:#000;
  font-family:inherit;font-size:14px;font-weight:800;padding:11px 18px;cursor:pointer;
  white-space:nowrap;transition:opacity .14s,transform .1s;}
.btn:active{opacity:.7;transform:scale(.97)}
.btn.g{background:var(--c2);color:var(--t2)}
.btn.blue{background:var(--blue);color:#fff}
.btn.red{background:var(--red);color:#fff}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:40px 24px;}
.empty-state .ico{font-size:40px;opacity:.15}
.empty-state p{font-size:14px;color:var(--t3);text-align:center;line-height:1.7}
.section-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:8px;}

/* ════════════════════
   GROCERIES + MEALS TAB (side by side)
════════════════════ */
#gm-view{
  display:none;
  flex:1;min-height:0;
  overflow:hidden;
}
#gm-view.on{display:flex;flex-direction:column;}
#gm-split{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  flex:1;
  min-height:0;
  overflow:hidden;
}
/* LEFT — Groceries */
#gm-left{
  display:flex;flex-direction:column;
  border-right:1px solid var(--sep);
  min-height:0;overflow:hidden;
}
#gm-left-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 10px;border-bottom:1px solid var(--sep);flex-shrink:0;
}
.col-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.col-bdg{background:var(--c3);color:var(--t3);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.col-clear{background:none;border:none;color:var(--t3);font-size:11px;font-weight:700;
  padding:5px 10px;border-radius:8px;cursor:pointer;}
.col-clear:active{background:var(--c3)}
#grocery-list{flex:1;overflow-y:auto;min-height:0;}
#grocery-list::-webkit-scrollbar{display:none}
#gm-add{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--sep);flex-shrink:0;}
#g-inp{flex:1;background:var(--c2);border:1px solid transparent;border-radius:12px;
  color:var(--t1);font-family:inherit;font-size:15px;padding:10px 12px;outline:none;}
#g-inp:focus{border-color:var(--gold);background:var(--c3)}
#g-inp::placeholder{color:var(--t3)}
#g-add-btn{background:var(--gold);border:none;border-radius:12px;color:#000;
  font-size:18px;font-weight:800;width:42px;height:42px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#g-add-btn:active{opacity:.7}

/* RIGHT — Meals */
#gm-right{
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
}
#gm-right-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 10px;border-bottom:1px solid var(--sep);flex-shrink:0;
}
#meals-scroll{flex:1;overflow-y:auto;min-height:0;padding:4px 0 8px;}
#meals-scroll::-webkit-scrollbar{display:none}
.meal-day{padding:8px 14px;border-bottom:1px solid var(--sep);}
.meal-day:last-child{border-bottom:none}
.meal-day-hd{display:flex;align-items:baseline;gap:7px;margin-bottom:6px;}
.meal-day-dow{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);}
.meal-day-dt{font-size:17px;font-weight:900;}
.meal-day.today .meal-day-dt{color:var(--gold);}
.meal-item{display:flex;align-items:center;gap:8px;background:var(--c2);border-radius:9px;
  padding:7px 10px;margin-bottom:5px;}
.meal-item-txt{flex:1;font-size:13px;line-height:1.3;}
.meal-item-rm{background:none;border:none;color:var(--t3);font-size:16px;padding:1px 4px;cursor:pointer;}
.meal-item-rm:active{color:var(--red)}
.meal-add-btn{background:none;border:1.5px dashed var(--c4);border-radius:9px;
  padding:6px 10px;width:100%;color:var(--t3);font-size:12px;cursor:pointer;text-align:left;}
.meal-add-btn:active{background:var(--c2)}
.meal-inp-row{display:none;gap:7px;margin-top:5px;align-items:center;}
.meal-inp-row.open{display:flex;}
.meal-inp{flex:1;background:var(--c2);border:1.5px solid var(--gold);border-radius:9px;
  color:var(--t1);font-family:inherit;font-size:14px;padding:8px 10px;outline:none;}
.meal-save-btn{background:var(--gold);border:none;border-radius:9px;color:#000;
  font-weight:800;padding:8px 12px;font-size:14px;cursor:pointer;}
.meal-cancel-btn{background:var(--c2);border:none;border-radius:9px;color:var(--t2);
  font-weight:700;padding:8px 10px;font-size:12px;cursor:pointer;}

/* ════════════════════
   TO-DO TAB
════════════════════ */
#todo-view{display:none;flex-direction:column;min-height:0;}
#todo-view.on{display:flex;}
#todo-add-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--sep);flex-shrink:0;}
#todo-inp{flex:1;background:var(--c2);border:1px solid transparent;border-radius:14px;
  color:var(--t1);font-family:inherit;font-size:16px;padding:12px 15px;outline:none;}
#todo-inp:focus{border-color:var(--gold);background:var(--c3)}
#todo-inp::placeholder{color:var(--t3)}
#todo-add-btn{background:var(--gold);border:none;border-radius:14px;color:#000;
  font-size:20px;font-weight:800;width:46px;height:46px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;}
#todo-add-btn:active{opacity:.7}
#todo-clear-bar{display:none;padding:6px 16px;}
#todo-clear-btn{background:var(--c2);border:none;border-radius:10px;color:var(--t3);
  font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;}
#todo-list{flex:1;overflow-y:auto;min-height:0;padding:4px 0;}
#todo-list::-webkit-scrollbar{display:none}

/* Shared list item style */
.li{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--sep);
  cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s;}
.li:active{background:var(--c1)}
.li.done .litxt{text-decoration:line-through;color:var(--t3)}
.lick{width:24px;height:24px;border-radius:50%;border:2px solid var(--c4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all .18s;}
.li.done .lick{background:var(--green);border-color:var(--green);color:#000}
.litxt{font-size:16px;flex:1;line-height:1.3}
.lirm{background:none;border:none;color:var(--t3);font-size:20px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;flex-shrink:0;
  transition:background .12s,color .12s;}
.lirm:active{background:rgba(255,69,58,.15);color:var(--red)}

/* ════════════════════
   MEETING BLOCKS TAB
════════════════════ */
#blocks-view{display:none;flex-direction:column;overflow-y:auto;}
#blocks-view.on{display:flex;}
#blocks-inner{padding:14px 16px calc(env(safe-area-inset-bottom,24px)+32px);display:flex;flex-direction:column;gap:16px;}

/* Who picker */
#block-who-row{display:flex;gap:8px;}
.who-btn{flex:1;padding:12px 8px;border-radius:14px;border:2px solid transparent;
  background:var(--c2);color:var(--t2);font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .18s;text-align:center;}
.who-btn.sel{border-color:var(--gold);background:rgba(200,168,75,.12);color:var(--gold);}

/* Date picker */
#block-dates{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.bday-chip{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border-radius:12px;background:var(--c2);border:2px solid transparent;cursor:pointer;
  transition:all .18s;}
.bday-chip.sel{background:rgba(200,168,75,.15);border-color:var(--gold);}
.bday-chip.today-chip{border-color:rgba(200,168,75,.35);}
.bday-chip-dow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);}
.bday-chip.sel .bday-chip-dow{color:rgba(200,168,75,.7);}
.bday-chip-dt{font-size:18px;font-weight:900;color:var(--t2);}
.bday-chip.sel .bday-chip-dt{color:var(--gold);}
.bday-chip.today-chip .bday-chip-dt{color:var(--gold);}

/* Time slots */
#block-times{display:flex;flex-direction:column;gap:0;background:var(--c1);border-radius:18px;overflow:hidden;}
.slot{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--sep);
  cursor:pointer;user-select:none;transition:background .12s;}
.slot:last-child{border-bottom:none}
.slot:active{background:rgba(255,255,255,.04)}
.slot.sel{background:rgba(200,168,75,.1);}
.slot-time{font-size:15px;font-weight:700;color:var(--t2);width:72px;flex-shrink:0;}
.slot-check{width:22px;height:22px;border-radius:7px;border:2px solid var(--c4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .18s;}
.slot.sel .slot-check{background:var(--gold);border-color:var(--gold);color:#000;}
.slot-label{font-size:14px;color:var(--t3);flex:1;}
.slot.sel .slot-label{color:var(--t1);}

/* Existing blocks */
#existing-blocks{display:flex;flex-direction:column;gap:8px;}
.block-item{display:flex;align-items:center;gap:12px;background:var(--c1);border-radius:14px;
  padding:12px 16px;}
.block-item-info{flex:1;min-width:0;}
.block-item-who{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.block-item-time{font-size:15px;font-weight:700;color:var(--t1);}
.block-item-date{font-size:12px;color:var(--t3);margin-top:2px;}
.block-item-rm{background:none;border:none;color:var(--t3);font-size:20px;padding:4px 8px;cursor:pointer;}
.block-item-rm:active{color:var(--red)}

/* Save button sticky */
#block-save-bar{
  position:sticky;bottom:0;
  background:rgba(8,8,8,.95);backdrop-filter:blur(12px);
  padding:12px 16px calc(env(safe-area-inset-bottom,16px)+12px);
  border-top:1px solid var(--sep);
  display:none;
}
#block-save-bar.show{display:block;}
#block-save-btn{width:100%;padding:16px;border-radius:16px;border:none;
  background:var(--gold);color:#000;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;}
#block-save-btn:active{opacity:.7}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-inner">
    <div id="app-title">Kitchen <span>Hub</span></div>
    <div id="sync-dot"><div class="sdot ok" id="sdot"></div><span id="sdot-lbl">Connected</span></div>
  </div>
  <div id="tabs">
    <button class="tab on" id="tab-gm" onclick="switchTab('gm')">
      🛒 Groceries & Meals
    </button>
    <button class="tab" id="tab-todo" onclick="switchTab('todo')">
      ✅ To-Do <span class="tab-bdg" id="tbdg">0</span>
    </button>
    <button class="tab" id="tab-blocks" onclick="switchTab('blocks')">
      📅 Schedule
    </button>
  </div>
</div>

<!-- ═══════════════════════════════
     GROCERIES + MEALS (side by side)
════════════════════════════════ -->
<div id="gm-view" class="on" style="height:calc(100dvh - var(--topbar-h, 130px));">
  <div id="gm-split">

    <!-- LEFT: Groceries -->
    <div id="gm-left">
      <div id="gm-left-hd">
        <div class="col-title">🛒 Groceries <span class="col-bdg" id="g-bdg">0</span></div>
        <button class="col-clear" onclick="clearDoneGrocery()">Clear done</button>
      </div>
      <div id="grocery-list">
        <div class="empty-state" id="g-empty"><div class="ico">🛒</div><p>Nothing yet</p></div>
      </div>
      <div id="gm-add">
        <input id="g-inp" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
          placeholder="Add item…" onkeydown="if(event.key==='Enter')addGrocery()">
        <button id="g-add-btn" onclick="addGrocery()">+</button>
      </div>
    </div>

    <!-- RIGHT: Meals -->
    <div id="gm-right">
      <div id="gm-right-hd">
        <div class="col-title">🍽️ Dinner Plan</div>
      </div>
      <div id="meals-scroll">
        <div class="empty-state" id="m-empty" style="display:none"><div class="ico">🍽️</div><p>Tap + to add meals</p></div>
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════
     TO-DO
════════════════════════════════ -->
<div id="todo-view">
  <div id="todo-add-bar">
    <input id="todo-inp" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
      placeholder="Add task…" onkeydown="if(event.key==='Enter')addTodo()">
    <button id="todo-add-btn" onclick="addTodo()">+</button>
  </div>
  <div id="todo-clear-bar">
    <button id="todo-clear-btn" onclick="clearDoneTodo()">Clear done items</button>
  </div>
  <div id="todo-list">
    <div class="empty-state" id="td-empty"><div class="ico">✅</div><p>Nothing to do.<br>Type above to add.</p></div>
  </div>
</div>

<!-- ═══════════════════════════════
     MEETING BLOCKS / SCHEDULE
════════════════════════════════ -->
<div id="blocks-view">
  <div id="blocks-inner">

    <div>
      <div class="section-title">WHO IS THIS FOR?</div>
      <div id="block-who-row">
        <button class="who-btn sel" data-who="Terra" onclick="selectWho(this)">Terra</button>
        <button class="who-btn" data-who="Chase" onclick="selectWho(this)">Chase</button>
        <button class="who-btn" data-who="Family" onclick="selectWho(this)">Family</button>
      </div>
    </div>

    <div>
      <div class="section-title">WHICH DAY?</div>
      <div id="block-dates"></div>
    </div>

    <div>
      <div class="section-title">SELECT TIME SLOTS (7AM – 6PM CENTRAL)</div>
      <div id="block-times"></div>
    </div>

    <div id="existing-blocks-wrap" style="display:none">
      <div class="section-title">UPCOMING BLOCKS</div>
      <div id="existing-blocks"></div>
    </div>

  </div>
</div>

<!-- Save bar (Meeting Blocks) -->
<div id="block-save-bar">
  <button id="block-save-btn" onclick="saveBlocks()">Add Meeting Blocks to Calendar</button>
</div>

<script>
// ═══════════════════════════════
//  FIREBASE
// ═══════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCMCrww2E6M8UYwH4LQKyPnHz7agflmU7M",
  authDomain: "kitchen-homebase.firebaseapp.com",
  databaseURL: "https://kitchen-homebase-default-rtdb.firebaseio.com",
  projectId: "kitchen-homebase",
  storageBucket: "kitchen-homebase.firebasestorage.app",
  messagingSenderId: "42483963800",
  appId: "1:42483963800:web:45503717a66278646d3ded"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ═══════════════════════════════
//  STATE
// ═══════════════════════════════
let currentTab = 'gm';
let groceryItems = [];
let todoItems = [];
let mealsData = {};
let mealEditDate = null;
let blockWho = 'Terra';
let blockDate = null;
let selectedSlots = new Set(); // Set of hour numbers (7–17)
let blockEvents = []; // loaded from Firebase

// ═══════════════════════════════
//  HELPERS
// ═══════════════════════════════
function fmtD(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtHour(h){
  const ampm=h>=12?'PM':'AM';const h12=h%12||12;return `${h12}:00 ${ampm}`;
}

// ═══════════════════════════════
//  CONNECTION
// ═══════════════════════════════
db.ref('.info/connected').on('value', snap=>{
  const ok=snap.val();
  document.getElementById('sdot').className='sdot '+(ok?'ok':'');
  document.getElementById('sdot-lbl').textContent=ok?'Connected':'Offline';
});

// ═══════════════════════════════
//  FIREBASE LISTENERS
// ═══════════════════════════════
db.ref('grocery').on('value', snap=>{
  const val=snap.val()||{};
  groceryItems=Object.entries(val).map(([id,v])=>({id,...v})).sort((a,b)=>(a.done-b.done)||(a.addedAt-b.addedAt));
  if(currentTab==='gm')renderGroceryList();
  updateGroceryBadge();
});

db.ref('todo').on('value', snap=>{
  const val=snap.val()||{};
  todoItems=Object.entries(val).map(([id,v])=>({id,...v})).sort((a,b)=>(a.done-b.done)||(a.addedAt-b.addedAt));
  if(currentTab==='todo')renderTodoList();
  updateTodoBadge();
});

// Meals — next 14 days
(function(){
  const today=new Date();
  for(let i=0;i<14;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const key=fmtD(d);
    db.ref('meals/'+key).on('value', snap=>{
      const val=snap.val();
      if(val&&val.length) mealsData[key]=val;
      else delete mealsData[key];
      if(currentTab==='gm') renderMeals();
    });
  }
})();

// Meeting block events (from Firebase events node, filtered to "Meeting Block" text)
db.ref('events').on('value', snap=>{
  const val=snap.val()||{};
  blockEvents=Object.entries(val)
    .map(([id,ev])=>({...ev,id}))
    .filter(ev=>(ev.summary||ev.text||'').includes('Meeting Block'))
    .sort((a,b)=>a.date?.localeCompare(b.date));
  if(currentTab==='blocks') renderExistingBlocks();
});

// ═══════════════════════════════
//  TOPBAR HEIGHT for gm layout
// ═══════════════════════════════
function setGMHeight(){
  const tb=document.getElementById('topbar');
  if(tb){
    const h=tb.offsetHeight;
    document.documentElement.style.setProperty('--topbar-h',h+'px');
    document.getElementById('gm-view').style.height=`calc(100dvh - ${h}px)`;
  }
}
window.addEventListener('resize',setGMHeight);
setTimeout(setGMHeight,100);

// ═══════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════
function switchTab(tab){
  currentTab=tab;
  ['gm','todo','blocks'].forEach(t=>{
    document.getElementById('tab-'+t)?.classList.toggle('on',t===tab);
    const v=document.getElementById(t+'-view');
    if(v){v.className=v.className.replace(' on','');if(t===tab)v.classList.add('on');}
  });
  document.getElementById('block-save-bar').classList.remove('show');
  if(tab==='gm'){renderGroceryList();renderMeals();setGMHeight();}
  if(tab==='todo'){renderTodoList();updateTodoBadge();}
  if(tab==='blocks'){buildBlockDates();buildTimeSlots();renderExistingBlocks();}
}

// ═══════════════════════════════
//  GROCERY
// ═══════════════════════════════
function renderGroceryList(){
  const list=document.getElementById('grocery-list');
  const empty=document.getElementById('g-empty');
  Array.from(list.querySelectorAll('.li')).forEach(el=>el.remove());
  if(!groceryItems.length){empty.style.display='flex';return;}
  empty.style.display='none';
  groceryItems.forEach(item=>{
    const div=document.createElement('div');
    div.className='li'+(item.done?' done':'');
    div.innerHTML=`<div class="lick">${item.done?'✓':''}</div><div class="litxt">${esc(item.text)}</div><button class="lirm" onclick="removeGrocery('${item.id}');event.stopPropagation()">×</button>`;
    div.querySelector('.lick').onclick=div.querySelector('.litxt').onclick=()=>toggleGrocery(item.id,item.done);
    list.appendChild(div);
  });
}
function addGrocery(){
  const inp=document.getElementById('g-inp');const text=inp.value.trim();if(!text)return;
  setSyncing();
  db.ref('grocery').push({text,done:false,addedAt:Date.now()}).then(()=>setConnected());
  inp.value='';inp.focus();
}
function toggleGrocery(id,done){db.ref('grocery/'+id+'/done').set(!done);}
function removeGrocery(id){db.ref('grocery/'+id).remove();}
function clearDoneGrocery(){
  const updates={};groceryItems.filter(i=>i.done).forEach(i=>{updates[i.id]=null;});
  if(Object.keys(updates).length)db.ref('grocery').update(updates);
}
function updateGroceryBadge(){
  document.getElementById('g-bdg').textContent=groceryItems.filter(i=>!i.done).length;
}

// ═══════════════════════════════
//  MEALS
// ═══════════════════════════════
function renderMeals(){
  const wrap=document.getElementById('meals-scroll');
  const empty=document.getElementById('m-empty');
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const todayStr=fmtD(new Date());
  Array.from(wrap.querySelectorAll('.meal-day')).forEach(el=>el.remove());
  let hasAny=false;
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const key=fmtD(d);const isToday=key===todayStr;
    const mealList=mealsData[key]||[];
    if(mealList.length)hasAny=true;
    const card=document.createElement('div');
    card.className='meal-day'+(isToday?' today':'');
    const rows=mealList.map((m,mi)=>`<div class="meal-item"><div class="meal-item-txt">${esc(m)}</div><button class="meal-item-rm" onclick="removeMeal('${key}',${mi})">×</button></div>`).join('');
    card.innerHTML=`<div class="meal-day-hd"><div class="meal-day-dow">${DOW[d.getDay()]}</div><div class="meal-day-dt">${MON[d.getMonth()]} ${d.getDate()}</div></div>`+
      `<div class="meal-body">${rows}<button class="meal-add-btn" onclick="startMealAdd('${key}')">+ Add meal</button></div>`+
      `<div class="meal-inp-row" id="mir-${key}"><input class="meal-inp" id="mi-${key}" placeholder="e.g. Tacos 🌮" onkeydown="if(event.key==='Enter')saveMealAdd('${key}');if(event.key==='Escape')cancelMealAdd('${key}')"><button class="meal-save-btn" onclick="saveMealAdd('${key}')">Add</button><button class="meal-cancel-btn" onclick="cancelMealAdd('${key}')">×</button></div>`;
    wrap.appendChild(card);
  }
  empty.style.display=hasAny?'none':'flex';
}
function startMealAdd(key){
  if(mealEditDate)cancelMealAdd(mealEditDate);
  mealEditDate=key;
  const row=document.getElementById('mir-'+key);
  if(row){row.classList.add('open');const inp=document.getElementById('mi-'+key);if(inp){inp.value='';inp.focus();}}
}
function cancelMealAdd(key){const row=document.getElementById('mir-'+key);if(row)row.classList.remove('open');mealEditDate=null;}
function saveMealAdd(key){
  const inp=document.getElementById('mi-'+key);const text=inp?inp.value.trim():'';
  if(!text){cancelMealAdd(key);return;}
  db.ref('meals/'+key).set([...(mealsData[key]||[]),text]);
  cancelMealAdd(key);
}
function removeMeal(key,idx){
  const arr=[...(mealsData[key]||[])];arr.splice(idx,1);
  db.ref('meals/'+key).set(arr.length?arr:null);
}

// ═══════════════════════════════
//  TO-DO
// ═══════════════════════════════
function renderTodoList(){
  const list=document.getElementById('todo-list');
  const empty=document.getElementById('td-empty');
  Array.from(list.querySelectorAll('.li')).forEach(el=>el.remove());
  if(!todoItems.length){empty.style.display='flex';return;}
  empty.style.display='none';
  const hasDone=todoItems.some(i=>i.done);
  document.getElementById('todo-clear-bar').style.display=hasDone?'block':'none';
  todoItems.forEach(item=>{
    const div=document.createElement('div');
    div.className='li'+(item.done?' done':'');
    div.innerHTML=`<div class="lick">${item.done?'✓':''}</div><div class="litxt">${esc(item.text)}</div><button class="lirm" onclick="removeTodo('${item.id}');event.stopPropagation()">×</button>`;
    div.querySelector('.lick').onclick=div.querySelector('.litxt').onclick=()=>toggleTodo(item.id,item.done);
    list.appendChild(div);
  });
}
function addTodo(){
  const inp=document.getElementById('todo-inp');const text=inp.value.trim();if(!text)return;
  setSyncing();
  db.ref('todo').push({text,done:false,addedAt:Date.now()}).then(()=>setConnected());
  inp.value='';inp.focus();
}
function toggleTodo(id,done){db.ref('todo/'+id+'/done').set(!done);}
function removeTodo(id){db.ref('todo/'+id).remove();}
function clearDoneTodo(){
  const updates={};todoItems.filter(i=>i.done).forEach(i=>{updates[i.id]=null;});
  if(Object.keys(updates).length)db.ref('todo').update(updates);
}
function updateTodoBadge(){
  document.getElementById('tbdg').textContent=todoItems.filter(i=>!i.done).length;
}

// ═══════════════════════════════
//  MEETING BLOCKS
// ═══════════════════════════════
function selectWho(btn){
  blockWho=btn.dataset.who;
  document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  updateSaveBar();
}

function buildBlockDates(){
  const wrap=document.getElementById('block-dates');wrap.innerHTML='';
  const DOW=['Su','Mo','Tu','We','Th','Fr','Sa'];
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<14;i++){
    const d=new Date(today);d.setDate(today.getDate()+i);
    const key=fmtD(d);const isToday=i===0;
    const chip=document.createElement('div');
    chip.className='bday-chip'+(isToday?' today-chip':'')+(blockDate===key?' sel':'');
    chip.dataset.date=key;
    chip.innerHTML=`<div class="bday-chip-dow">${DOW[d.getDay()]}</div><div class="bday-chip-dt">${d.getDate()}</div>`;
    chip.onclick=()=>{
      blockDate=key;
      document.querySelectorAll('.bday-chip').forEach(c=>c.classList.remove('sel'));
      chip.classList.add('sel');
      selectedSlots.clear();
      buildTimeSlots();
      updateSaveBar();
    };
    wrap.appendChild(chip);
  }
  // Default select today
  if(!blockDate){blockDate=fmtD(today);wrap.querySelector('.bday-chip')?.classList.add('sel');}
}

function buildTimeSlots(){
  const wrap=document.getElementById('block-times');wrap.innerHTML='';
  for(let h=7;h<=17;h++){
    const slot=document.createElement('div');
    const isSel=selectedSlots.has(h);
    slot.className='slot'+(isSel?' sel':'');
    slot.innerHTML=`<div class="slot-time">${fmtHour(h)}</div><div class="slot-check">${isSel?'✓':''}</div><div class="slot-label">Meeting Block</div>`;
    slot.onclick=()=>{
      if(selectedSlots.has(h))selectedSlots.delete(h);
      else selectedSlots.add(h);
      buildTimeSlots();
      updateSaveBar();
    };
    wrap.appendChild(slot);
  }
}

function updateSaveBar(){
  const bar=document.getElementById('block-save-bar');
  const count=selectedSlots.size;
  const btn=document.getElementById('block-save-btn');
  if(count>0&&blockDate){
    bar.classList.add('show');
    btn.textContent=`Add ${count} Meeting Block${count>1?'s':''} for ${blockWho}`;
  } else {
    bar.classList.remove('show');
  }
}

async function saveBlocks(){
  if(!selectedSlots.size||!blockDate)return;
  const btn=document.getElementById('block-save-btn');
  btn.textContent='Saving…';btn.disabled=true;
  const saves=[];
  const d=new Date(blockDate+'T12:00:00');
  const dateLabel=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  selectedSlots.forEach(h=>{
    const time=fmtHour(h);
    const entry={
      date:blockDate,
      summary:`Meeting Block`,
      text:`Meeting Block`,
      time,
      member:blockWho,
      src:'local',
      createdAt:Date.now()
    };
    saves.push(db.ref('events').push(entry));
  });
  await Promise.all(saves);
  btn.textContent=`✓ Added ${saves.length} block${saves.length>1?'s':''}!`;
  btn.disabled=false;
  setTimeout(()=>{
    selectedSlots.clear();
    buildTimeSlots();
    updateSaveBar();
    renderExistingBlocks();
  },1200);
}

function renderExistingBlocks(){
  const wrap=document.getElementById('existing-blocks-wrap');
  const list=document.getElementById('existing-blocks');
  const today=fmtD(new Date());
  const upcoming=blockEvents.filter(e=>e.date>=today).slice(0,20);
  if(!upcoming.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML='';
  upcoming.forEach(ev=>{
    const d=new Date(ev.date+'T12:00:00');
    const dateLabel=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const who=ev.member||'';
    const memberColors={'Terra':'#c8a84b','Chase':'#4facfe','Family':'#34c759'};
    const color=memberColors[who]||'#4facfe';
    const div=document.createElement('div');div.className='block-item';
    div.innerHTML=`<div style="width:3px;height:40px;border-radius:2px;background:${color};flex-shrink:0"></div>`+
      `<div class="block-item-info">`+
        `<div class="block-item-who" style="color:${color}">${who}</div>`+
        `<div class="block-item-time">Meeting Block · ${ev.time||''}</div>`+
        `<div class="block-item-date">${dateLabel}</div>`+
      `</div>`+
      `<button class="block-item-rm" onclick="removeBlock('${ev.id}')">×</button>`;
    list.appendChild(div);
  });
}

function removeBlock(id){db.ref('events/'+id).remove();}

// ═══════════════════════════════
//  SYNC DOT HELPERS
// ═══════════════════════════════
function setSyncing(){document.getElementById('sdot').className='sdot syn';document.getElementById('sdot-lbl').textContent='Saving…';}
function setConnected(){document.getElementById('sdot').className='sdot ok';document.getElementById('sdot-lbl').textContent='Connected';}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
window.addEventListener('load',()=>{
  setGMHeight();
  renderGroceryList();
  renderMeals();
});
</script>
