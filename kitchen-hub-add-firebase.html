<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080808">
<title>Kitchen Hub</title>
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="icon" type="image/jpeg" href="icon.jpg">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{--bg:#080808;--c1:#111;--c2:#181818;--c3:#222;--c4:#2a2a2a;--sep:rgba(255,255,255,0.07);--t1:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.28);--t4:rgba(255,255,255,.11);--gold:#c8a84b;--green:#34c759;--red:#ff453a;--orange:#ff9500;--blue:#4facfe;--purple:#bf5af2;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--t1);font-family:-apple-system,"SF Pro Text","Outfit",sans-serif;-webkit-font-smoothing:antialiased;height:100dvh;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100dvh;}
#topbar{flex-shrink:0;background:rgba(8,8,8,.97);border-bottom:1px solid var(--sep);padding:env(safe-area-inset-top,12px) 14px 0;z-index:100;}
#topbar-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;}
#app-title{font-size:19px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;}
#app-title img{width:28px;height:28px;border-radius:6px;object-fit:cover;}
#app-title span{color:var(--gold)}
#sync-dot{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);font-weight:600;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--c4)}
.sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.syn{background:var(--gold);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#tabs{display:flex;gap:3px;padding-bottom:10px;}
.tab{flex:1;padding:8px 4px;border-radius:10px;border:none;font-family:inherit;font-size:11px;font-weight:700;background:var(--c2);color:var(--t3);cursor:pointer;transition:all .15s;min-height:40px;line-height:1.25;}
.tab.on{background:var(--gold);color:#000}
.tab-bdg{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.18);border-radius:20px;font-size:9px;font-weight:800;padding:0 5px;height:15px;margin-left:3px;min-width:15px;}
.tab:not(.on) .tab-bdg{background:var(--c3);color:var(--t3)}
#content{flex:1;min-height:0;position:relative;overflow:hidden;}
.view{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.view.on{display:flex;}
.inp{background:var(--c2);border:1px solid transparent;border-radius:12px;color:var(--t1);font-family:inherit;font-size:16px;padding:10px 13px;outline:none;transition:border-color .15s,background .15s;-webkit-appearance:none;}
.inp:focus{border-color:var(--gold);background:var(--c3)}
.inp::placeholder{color:var(--t3)}
.section-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:8px;}
.li{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--sep);cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s;}
.li:active{background:var(--c1)}
.li.done .litxt{text-decoration:line-through;color:var(--t3)}
.lick{width:24px;height:24px;border-radius:50%;border:2px solid var(--c4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;transition:all .18s;}
.li.done .lick{background:var(--green);border-color:var(--green);color:#000}
.litxt{font-size:16px;flex:1;line-height:1.3}
.lirm{background:none;border:none;color:var(--t3);font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;flex-shrink:0;}
.lirm:active{color:var(--red)}
.empty-v{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:40px 24px;flex:1;}
.empty-v .ico{font-size:36px;opacity:.15}
.empty-v p{font-size:13px;color:var(--t3);text-align:center;line-height:1.7}
/* GM */
#gm-split{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0;overflow:hidden;}
#gm-left,#gm-right{display:flex;flex-direction:column;min-height:0;overflow:hidden;}
#gm-left{border-right:1px solid var(--sep);}
.col-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 13px 9px;border-bottom:1px solid var(--sep);flex-shrink:0;}
.col-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;}
.col-bdg{background:var(--c3);color:var(--t3);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
.col-clr{background:none;border:none;color:var(--t3);font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;cursor:pointer;}
.col-clr:active{background:var(--c3)}
#grocery-list{flex:1;overflow-y:auto;min-height:0;}
#grocery-list::-webkit-scrollbar{display:none}
#g-add-row{display:flex;gap:7px;padding:9px 10px;border-top:1px solid var(--sep);flex-shrink:0;}
#g-inp{flex:1;background:var(--c2);border:1.5px solid transparent;border-radius:11px;color:var(--t1);font-family:inherit;font-size:15px;padding:9px 11px;outline:none;}
#g-inp:focus{border-color:var(--gold);background:var(--c3)}
#g-inp::placeholder{color:var(--t3)}
#g-btn{background:var(--gold);border:none;border-radius:11px;color:#000;font-size:20px;font-weight:900;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#g-btn:active{opacity:.7}
#meals-scroll{flex:1;overflow-y:auto;min-height:0;}
#meals-scroll::-webkit-scrollbar{display:none}
.meal-day{padding:8px 12px;border-bottom:1px solid var(--sep);}
.meal-day:last-child{border-bottom:none}
.meal-day-hd{display:flex;align-items:baseline;gap:6px;margin-bottom:5px;}
.meal-dow{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);}
.meal-dt{font-size:15px;font-weight:900;}
.meal-day.tod .meal-dt{color:var(--gold);}
.meal-item{display:flex;align-items:center;gap:8px;background:var(--c2);border-radius:8px;padding:6px 9px;margin-bottom:4px;}
.meal-item-txt{flex:1;font-size:12px;line-height:1.3}
.meal-rm{background:none;border:none;color:var(--t3);font-size:15px;padding:1px 3px;cursor:pointer;line-height:1;}
.meal-rm:active{color:var(--red)}
.meal-add-btn{background:none;border:1.5px dashed var(--c4);border-radius:8px;padding:5px 9px;width:100%;color:var(--t3);font-size:11px;cursor:pointer;text-align:left;}
.meal-add-btn:active{background:var(--c2)}
.meal-inp-row{display:none;gap:6px;margin-top:4px;align-items:center;}
.meal-inp-row.open{display:flex;}
.meal-inp{flex:1;background:var(--c2);border:1.5px solid var(--gold);border-radius:8px;color:var(--t1);font-family:inherit;font-size:14px;padding:7px 9px;outline:none;}
.meal-save{background:var(--gold);border:none;border-radius:8px;color:#000;font-weight:800;padding:7px 11px;font-size:13px;cursor:pointer;}
.meal-cancel{background:var(--c2);border:none;border-radius:8px;color:var(--t2);font-weight:700;padding:7px 9px;font-size:11px;cursor:pointer;}
/* TODO */
#todo-add-row{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--sep);flex-shrink:0;}
#todo-inp{flex:1;background:var(--c2);border:1px solid transparent;border-radius:13px;color:var(--t1);font-family:inherit;font-size:16px;padding:11px 14px;outline:none;}
#todo-inp:focus{border-color:var(--gold);background:var(--c3)}
#todo-inp::placeholder{color:var(--t3)}
#todo-btn{background:var(--gold);border:none;border-radius:13px;color:#000;font-size:20px;font-weight:900;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#todo-btn:active{opacity:.7}
#todo-clr-bar{display:none;padding:5px 14px;}
#todo-clr-btn{background:var(--c2);border:none;border-radius:9px;color:var(--t3);font-size:11px;font-weight:700;padding:6px 13px;cursor:pointer;}
#todo-list{flex:1;overflow-y:auto;min-height:0;}
#todo-list::-webkit-scrollbar{display:none}
/* CHORES */
#chores-scroll{flex:1;overflow-y:auto;min-height:0;padding-bottom:env(safe-area-inset-bottom,16px);}
#chores-scroll::-webkit-scrollbar{display:none}
.chore-person-hd{display:flex;align-items:center;gap:10px;padding:12px 16px 6px;flex-shrink:0;}
.chore-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
.chore-person-name{font-size:14px;font-weight:800;}
.chore-progress{height:3px;background:var(--c3);border-radius:2px;margin:0 16px 4px;overflow:hidden;}
.chore-pb{height:100%;border-radius:2px;transition:width .4s;}
.chi{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--sep);cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s;}
.chi:active{background:var(--c1)}
.chi.done .chi-txt{text-decoration:line-through;color:var(--t3);}
.chi-ck{width:22px;height:22px;border-radius:7px;border:2px solid var(--c4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .18s;}
.chi-txt{font-size:15px;flex:1;line-height:1.3;}
.chi-day{font-size:10px;font-weight:700;color:var(--t3);}
/* BLOCKS */
#blocks-scroll{flex:1;overflow-y:auto;min-height:0;}
#blocks-scroll::-webkit-scrollbar{display:none}
#blocks-inner{padding:14px 14px calc(env(safe-area-inset-bottom,16px)+80px);display:flex;flex-direction:column;gap:14px;}
#block-who-row{display:flex;gap:7px;}
.who-btn{flex:1;padding:11px 6px;border-radius:13px;border:2px solid transparent;background:var(--c2);color:var(--t2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.who-btn.sel{border-color:var(--gold);background:rgba(200,168,75,.12);color:var(--gold);}
#block-dates{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.dchip{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:11px;background:var(--c2);border:2px solid transparent;cursor:pointer;transition:all .15s;}
.dchip.sel{background:rgba(200,168,75,.15);border-color:var(--gold);}
.dchip.tod{border-color:rgba(200,168,75,.35);}
.dchip-dow{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);}
.dchip.sel .dchip-dow,.dchip.tod .dchip-dow{color:rgba(200,168,75,.7);}
.dchip-dt{font-size:17px;font-weight:900;color:var(--t2);}
.dchip.sel .dchip-dt,.dchip.tod .dchip-dt{color:var(--gold);}
#block-times{display:flex;flex-direction:column;background:var(--c1);border-radius:16px;overflow:hidden;}
.slot{display:flex;align-items:center;gap:12px;padding:10px 15px;border-bottom:1px solid var(--sep);cursor:pointer;user-select:none;transition:background .1s;}
.slot:last-child{border-bottom:none}
.slot:active{background:rgba(255,255,255,.04)}
.slot.sel{background:rgba(200,168,75,.1);}
.slot-time{font-size:14px;font-weight:700;color:var(--t2);width:74px;flex-shrink:0;}
.slot-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--c4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;transition:all .15s;}
.slot.sel .slot-check{background:var(--gold);border-color:var(--gold);color:#000;}
.slot-lbl{font-size:13px;color:var(--t3);flex:1;}
.slot.sel .slot-lbl{color:var(--t1);}
.slot.half .slot-time{color:var(--t4);font-size:12px;}
.slot.half{padding-left:24px;}
#existing-blocks-wrap{display:none}
#existing-blocks{display:flex;flex-direction:column;gap:7px;}
.block-item{display:flex;align-items:center;gap:10px;background:var(--c1);border-radius:13px;padding:11px 14px;}
.block-item-info{flex:1;min-width:0;}
.block-who{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.block-time{font-size:14px;font-weight:700;}
.block-date{font-size:11px;color:var(--t3);margin-top:1px;}
.block-rm{background:none;border:none;color:var(--t3);font-size:19px;padding:3px 7px;cursor:pointer;}
.block-rm:active{color:var(--red)}
#save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,.96);backdrop-filter:blur(14px);padding:10px 14px calc(env(safe-area-inset-bottom,14px)+10px);border-top:1px solid var(--sep);display:none;z-index:200;}
#save-bar.show{display:block;}
#save-btn{width:100%;padding:15px;border-radius:15px;border:none;background:var(--gold);color:#000;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer;}
#save-btn:active{opacity:.7}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-inner">
      <div id="app-title"><img src="icon.jpg" alt="">Kitchen <span>Hub</span></div>
      <div id="sync-dot"><div class="sdot ok" id="sdot"></div><span id="sdot-lbl">Connected</span></div>
    </div>
    <div id="tabs">
      <button class="tab on" id="tab-gm" onclick="switchTab('gm')">🛒 Groceries<br>&amp; Meals</button>
      <button class="tab" id="tab-todo" onclick="switchTab('todo')">✅ To-Do <span class="tab-bdg" id="tbdg">0</span></button>
      <button class="tab" id="tab-chores" onclick="switchTab('chores')">🧹 Chores <span class="tab-bdg" id="chbdg">0</span></button>
      <button class="tab" id="tab-blocks" onclick="switchTab('blocks')">📅 Schedule</button>
    </div>
  </div>
  <div id="content">
    <!-- GROCERIES + MEALS -->
    <div class="view on" id="gm-view">
      <div id="gm-split">
        <div id="gm-left">
          <div class="col-hd">
            <div class="col-title">🛒 Groceries <span class="col-bdg" id="g-bdg">0</span></div>
            <button class="col-clr" onclick="clearDoneGrocery()">Clear done</button>
          </div>
          <div id="grocery-list"><div class="empty-v" id="g-empty"><div class="ico">🛒</div><p>Nothing yet</p></div></div>
          <div id="g-add-row">
            <input id="g-inp" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Add item…" onkeydown="if(event.key==='Enter')addGrocery()">
            <button id="g-btn" onclick="addGrocery()">+</button>
          </div>
        </div>
        <div id="gm-right">
          <div class="col-hd"><div class="col-title">🍽️ Dinner Plan</div></div>
          <div id="meals-scroll"><div class="empty-v" id="m-empty" style="display:none"><div class="ico">🍽️</div><p>Tap + to plan a meal</p></div></div>
        </div>
      </div>
    </div>
    <!-- TO-DO -->
    <div class="view" id="todo-view">
      <div id="todo-add-row">
        <input id="todo-inp" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Add task…" onkeydown="if(event.key==='Enter')addTodo()">
        <button id="todo-btn" onclick="addTodo()">+</button>
      </div>
      <div id="todo-clr-bar"><button id="todo-clr-btn" onclick="clearDoneTodo()">Clear done</button></div>
      <div id="todo-list"><div class="empty-v" id="td-empty"><div class="ico">✅</div><p>Nothing to do.<br>Type above to add.</p></div></div>
    </div>
    <!-- CHORES -->
    <div class="view" id="chores-view">
      <div id="chores-scroll">
        <div class="empty-v" id="ch-empty" style="display:none"><div class="ico">🧹</div><p>No chores due today</p></div>
        <div id="chores-by-person"></div>
      </div>
    </div>
    <!-- SCHEDULE -->
    <div class="view" id="blocks-view">
      <div id="blocks-scroll">
        <div id="blocks-inner">
          <div>
            <div class="section-lbl">WHO IS THIS FOR?</div>
            <div id="block-who-row">
              <button class="who-btn sel" data-who="Terra" onclick="selectWho(this)">Terra</button>
              <button class="who-btn" data-who="Chase" onclick="selectWho(this)">Chase</button>
              <button class="who-btn" data-who="Family" onclick="selectWho(this)">Family</button>
            </div>
          </div>
          <div>
            <div class="section-lbl">WHICH DAY?</div>
            <div id="block-dates"></div>
          </div>
          <div>
            <div class="section-lbl">SELECT TIMES (7:00 AM – 6:00 PM)</div>
            <div id="block-times"></div>
          </div>
          <div id="existing-blocks-wrap">
            <div class="section-lbl">UPCOMING BLOCKS</div>
            <div id="existing-blocks"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="save-bar"><button id="save-btn" onclick="saveBlocks()">Add Meeting Blocks to Calendar</button></div>
<script>
const firebaseConfig={apiKey:"AIzaSyCMCrww2E6M8UYwH4LQKyPnHz7agflmU7M",authDomain:"kitchen-homebase.firebaseapp.com",databaseURL:"https://kitchen-homebase-default-rtdb.firebaseio.com",projectId:"kitchen-homebase",storageBucket:"kitchen-homebase.firebasestorage.app",messagingSenderId:"42483963800",appId:"1:42483963800:web:45503717a66278646d3ded"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let currentTab="gm",groceryItems=[],todoItems=[],mealsData={},chores=[],choresDone={},mealEditDate=null,blockWho="Terra",blockDate=null,selectedSlots=new Set(),blockEvents=[];
function fmtD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtSlot(hhmm){const[h,m]=hhmm.split(":").map(Number);const ap=h>=12?"PM":"AM";const h12=h%12||12;return h12+":"+(m<10?"0"+m:m)+" "+ap;}
db.ref(".info/connected").on("value",s=>{const ok=s.val();document.getElementById("sdot").className="sdot "+(ok?"ok":"");document.getElementById("sdot-lbl").textContent=ok?"Connected":"Offline";});
db.ref("grocery").on("value",s=>{const v=s.val()||{};groceryItems=Object.entries(v).map(([id,x])=>({id,...x})).sort((a,b)=>(a.done-b.done)||(a.addedAt-b.addedAt));if(currentTab==="gm")renderGroceryList();updateBadge("g-bdg",groceryItems.filter(i=>!i.done).length);});
db.ref("todo").on("value",s=>{const v=s.val()||{};todoItems=Object.entries(v).map(([id,x])=>({id,...x})).sort((a,b)=>(a.done-b.done)||(a.addedAt-b.addedAt));if(currentTab==="todo")renderTodoList();updateBadge("tbdg",todoItems.filter(i=>!i.done).length);});
(function(){const t=new Date();for(let i=0;i<14;i++){const d=new Date(t);d.setDate(t.getDate()+i);const k=fmtD(d);db.ref("meals/"+k).on("value",s=>{const v=s.val();if(v&&v.length)mealsData[k]=v;else delete mealsData[k];if(currentTab==="gm")renderMeals();});}})();
db.ref("chores").on("value",s=>{const v=s.val();if(!v)chores=[];else if(Array.isArray(v))chores=v;else chores=Object.values(v);if(currentTab==="chores")renderChores();updateChoreBadge();});
db.ref("choresDone").on("value",s=>{choresDone=s.val()||{};if(currentTab==="chores")renderChores();updateChoreBadge();});
db.ref("events").on("value",s=>{const v=s.val()||{};blockEvents=Object.entries(v).map(([id,ev])=>({...ev,id})).filter(ev=>(ev.summary||ev.text||"").includes("Meeting Block")).sort((a,b)=>(a.date||"").localeCompare(b.date||""));if(currentTab==="blocks")renderExistingBlocks();});
function switchTab(tab){
  currentTab=tab;
  ["gm","todo","chores","blocks"].forEach(t=>{document.getElementById("tab-"+t)?.classList.toggle("on",t===tab);});
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  const view=document.getElementById(tab+"-view");if(view)view.classList.add("on");
  document.getElementById("save-bar").classList.remove("show");
  const scroll=view?.querySelector('[id$="-scroll"],[id$="-list"]');if(scroll)scroll.scrollTop=0;
  if(tab==="gm"){renderGroceryList();renderMeals();setTimeout(()=>document.getElementById("g-inp")?.focus(),80);}
  if(tab==="todo"){renderTodoList();setTimeout(()=>document.getElementById("todo-inp")?.focus(),80);}
  if(tab==="chores"){renderChores();}
  if(tab==="blocks"){buildBlockDates();buildTimeSlots();renderExistingBlocks();}
}
function renderGroceryList(){const list=document.getElementById("grocery-list"),empty=document.getElementById("g-empty");Array.from(list.querySelectorAll(".li")).forEach(el=>el.remove());if(!groceryItems.length){empty.style.display="flex";return;}empty.style.display="none";groceryItems.forEach(item=>{const div=document.createElement("div");div.className="li"+(item.done?" done":"");div.innerHTML=`<div class="lick">${item.done?"✓":""}</div><div class="litxt">${esc(item.text)}</div><button class="lirm" onclick="removeGrocery('${item.id}');event.stopPropagation()">×</button>`;div.querySelector(".lick").onclick=div.querySelector(".litxt").onclick=()=>toggleGrocery(item.id,item.done);list.appendChild(div);});}
function addGrocery(){const inp=document.getElementById("g-inp");const t=inp.value.trim();if(!t)return;sync();db.ref("grocery").push({text:t,done:false,addedAt:Date.now()}).then(unsync);inp.value="";inp.focus();}
function toggleGrocery(id,done){db.ref("grocery/"+id+"/done").set(!done);}
function removeGrocery(id){db.ref("grocery/"+id).remove();}
function clearDoneGrocery(){const u={};groceryItems.filter(i=>i.done).forEach(i=>{u[i.id]=null;});if(Object.keys(u).length)db.ref("grocery").update(u);}
function renderMeals(){const wrap=document.getElementById("meals-scroll"),empty=document.getElementById("m-empty");Array.from(wrap.querySelectorAll(".meal-day")).forEach(el=>el.remove());const ts=fmtD(new Date());const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"],MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];let has=false;for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);const k=fmtD(d),isTod=k===ts,ml=mealsData[k]||[];if(ml.length)has=true;const card=document.createElement("div");card.className="meal-day"+(isTod?" tod":"");const rows=ml.map((m,mi)=>`<div class="meal-item"><div class="meal-item-txt">${esc(m)}</div><button class="meal-rm" onclick="removeMeal('${k}',${mi})">×</button></div>`).join("");card.innerHTML=`<div class="meal-day-hd"><div class="meal-dow">${DOW[d.getDay()]}</div><div class="meal-dt">${MON[d.getMonth()]} ${d.getDate()}</div></div><div>${rows}<button class="meal-add-btn" onclick="startMealAdd('${k}')">+ Add meal</button></div><div class="meal-inp-row" id="mir-${k}"><input class="meal-inp" id="mi-${k}" placeholder="e.g. Tacos 🌮" onkeydown="if(event.key==='Enter')saveMealAdd('${k}');if(event.key==='Escape')cancelMealAdd('${k}')"><button class="meal-save" onclick="saveMealAdd('${k}')">Add</button><button class="meal-cancel" onclick="cancelMealAdd('${k}')">×</button></div>`;wrap.appendChild(card);}empty.style.display=has?"none":"flex";}
function startMealAdd(k){if(mealEditDate)cancelMealAdd(mealEditDate);mealEditDate=k;const row=document.getElementById("mir-"+k);if(row){row.classList.add("open");const inp=document.getElementById("mi-"+k);if(inp){inp.value="";inp.focus();}}}
function cancelMealAdd(k){const row=document.getElementById("mir-"+k);if(row)row.classList.remove("open");mealEditDate=null;}
function saveMealAdd(k){const inp=document.getElementById("mi-"+k);const t=inp?inp.value.trim():"";if(!t){cancelMealAdd(k);return;}db.ref("meals/"+k).set([...(mealsData[k]||[]),t]);cancelMealAdd(k);}
function removeMeal(k,i){const a=[...(mealsData[k]||[])];a.splice(i,1);db.ref("meals/"+k).set(a.length?a:null);}
function renderTodoList(){const list=document.getElementById("todo-list"),empty=document.getElementById("td-empty");Array.from(list.querySelectorAll(".li")).forEach(el=>el.remove());if(!todoItems.length){empty.style.display="flex";return;}empty.style.display="none";const hd=todoItems.some(i=>i.done);document.getElementById("todo-clr-bar").style.display=hd?"block":"none";todoItems.forEach(item=>{const div=document.createElement("div");div.className="li"+(item.done?" done":"");div.innerHTML=`<div class="lick">${item.done?"✓":""}</div><div class="litxt">${esc(item.text)}</div><button class="lirm" onclick="removeTodo('${item.id}');event.stopPropagation()">×</button>`;div.querySelector(".lick").onclick=div.querySelector(".litxt").onclick=()=>toggleTodo(item.id,item.done);list.appendChild(div);});}
function addTodo(){const inp=document.getElementById("todo-inp");const t=inp.value.trim();if(!t)return;sync();db.ref("todo").push({text:t,done:false,addedAt:Date.now()}).then(unsync);inp.value="";inp.focus();}
function toggleTodo(id,done){db.ref("todo/"+id+"/done").set(!done);}
function removeTodo(id){db.ref("todo/"+id).remove();}
function clearDoneTodo(){const u={};todoItems.filter(i=>i.done).forEach(i=>{u[i.id]=null;});if(Object.keys(u).length)db.ref("todo").update(u);}
const DAY_NAMES=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
function choreDay(c){return c.day||c.freq||"weekly";}
function isChoreToday(c){const d=choreDay(c);const now=new Date();if(d==="daily")return true;if(d==="monthly")return now.getDate()===1;const di=DAY_NAMES.indexOf(d);if(di>=0)return now.getDay()===di;return true;}
function choreKey(idx,c){function fd(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}const now=new Date();const d=choreDay(c);if(d==="daily")return "d_"+fd(now)+"_"+idx;if(d==="monthly")return "m_"+now.getFullYear()+"_"+now.getMonth()+"_"+idx;const di=DAY_NAMES.indexOf(d);const sun=new Date(now);sun.setDate(now.getDate()-now.getDay());if(di>=0)return "wd_"+fd(sun)+"_"+d+"_"+idx;return "w_"+fd(sun)+"_"+idx;}
function choreLabel(c){const d=choreDay(c);if(d==="daily")return "Every Day";if(d==="monthly")return "1st of Month";const di=DAY_NAMES.indexOf(d);if(di>=0){const full=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];return full[di]+"s";}return "Weekly";}
function renderChores(){const container=document.getElementById("chores-by-person"),empty=document.getElementById("ch-empty");container.innerHTML="";const memberColors={Terra:"#c8a84b",Chase:"#4facfe",Rory:"#34c759",Family:"#bf5af2"};const byPerson={};chores.forEach((c,idx)=>{if(!isChoreToday(c))return;const m=c.member||"Family";if(!byPerson[m])byPerson[m]=[];byPerson[m].push({...c,idx});});const dueToday=Object.values(byPerson).flat();if(!dueToday.length){empty.style.display="flex";return;}empty.style.display="none";Object.entries(byPerson).forEach(([member,mc])=>{const color=memberColors[member]||"#4facfe";const done=mc.filter(c=>!!choresDone[choreKey(c.idx,c).replace(/\//g,"_")]).length;const total=mc.length;const pct=total?Math.round(done/total*100):0;const hd=document.createElement("div");hd.className="chore-person-hd";hd.innerHTML=`<div class="chore-av" style="background:${color}22;color:${color}">${member.charAt(0)}</div><div class="chore-person-name" style="color:${color}">${member}</div><div style="margin-left:auto;font-size:11px;color:var(--t3)">${done}/${total}</div>`;container.appendChild(hd);const pg=document.createElement("div");pg.className="chore-progress";pg.innerHTML=`<div class="chore-pb" style="width:${pct}%;background:${color}"></div>`;container.appendChild(pg);mc.forEach(c=>{const key=choreKey(c.idx,c).replace(/\//g,"_");const isDone=!!choresDone[key];const row=document.createElement("div");row.className="chi"+(isDone?" done":"");row.innerHTML=`<div class="chi-ck" style="${isDone?`background:${color};border-color:${color};color:#000`:""}">${isDone?"✓":""}</div><div class="chi-txt">${esc(c.text)}</div><div class="chi-day">${choreLabel(c)}</div>`;row.onclick=()=>{if(isDone)db.ref("choresDone/"+key).remove();else db.ref("choresDone/"+key).set(true);};container.appendChild(row);});});}
function updateChoreBadge(){const due=chores.map((c,i)=>({...c,idx:i})).filter(c=>isChoreToday(c));const undone=due.filter(c=>!choresDone[choreKey(c.idx,c).replace(/\//g,"_")]).length;updateBadge("chbdg",undone);}
function selectWho(btn){blockWho=btn.dataset.who;document.querySelectorAll(".who-btn").forEach(b=>b.classList.remove("sel"));btn.classList.add("sel");updateSaveBar();}
function buildBlockDates(){const wrap=document.getElementById("block-dates");wrap.innerHTML="";const DOW=["Su","Mo","Tu","We","Th","Fr","Sa"];const today=new Date();today.setHours(0,0,0,0);for(let i=0;i<14;i++){const d=new Date(today);d.setDate(today.getDate()+i);const key=fmtD(d);const isTod=i===0;const chip=document.createElement("div");chip.className="dchip"+(isTod?" tod":"")+(blockDate===key?" sel":"");chip.innerHTML=`<div class="dchip-dow">${DOW[d.getDay()]}</div><div class="dchip-dt">${d.getDate()}</div>`;chip.onclick=()=>{blockDate=key;document.querySelectorAll(".dchip").forEach(c=>c.classList.remove("sel"));chip.classList.add("sel");selectedSlots.clear();buildTimeSlots();updateSaveBar();};wrap.appendChild(chip);}if(!blockDate){blockDate=fmtD(today);wrap.querySelector(".dchip")?.classList.add("sel");}}
function buildTimeSlots(){const wrap=document.getElementById("block-times");wrap.innerHTML="";for(let h=7;h<=18;h++){for(let m=0;m<60;m+=30){if(h===18&&m>0)break;const key=(h<10?"0"+h:h)+":"+(m<10?"0"+m:m);const isHalf=m===30;const isSel=selectedSlots.has(key);const slot=document.createElement("div");slot.className="slot"+(isSel?" sel":"")+(isHalf?" half":"");slot.innerHTML=`<div class="slot-time">${fmtSlot(key)}</div><div class="slot-check">${isSel?"✓":""}</div><div class="slot-lbl">Meeting Block</div>`;slot.onclick=()=>{if(selectedSlots.has(key))selectedSlots.delete(key);else selectedSlots.add(key);buildTimeSlots();updateSaveBar();};wrap.appendChild(slot);}}}
function updateSaveBar(){const count=selectedSlots.size;const btn=document.getElementById("save-btn");const bar=document.getElementById("save-bar");if(count>0&&blockDate){bar.classList.add("show");btn.textContent="Add "+count+" Meeting Block"+(count!==1?"s":"")+" for "+blockWho;}else{bar.classList.remove("show");}}
async function saveBlocks(){if(!selectedSlots.size||!blockDate)return;const btn=document.getElementById("save-btn");btn.textContent="Saving…";btn.disabled=true;const saves=[];selectedSlots.forEach(hhmm=>{saves.push(db.ref("events").push({date:blockDate,summary:"Meeting Block",text:"Meeting Block",time:fmtSlot(hhmm),member:blockWho,src:"local",createdAt:Date.now()}));});await Promise.all(saves);btn.textContent="✓ Added "+saves.length+" block"+(saves.length!==1?"s":"")+"!";btn.disabled=false;setTimeout(()=>{selectedSlots.clear();buildTimeSlots();updateSaveBar();renderExistingBlocks();},1200);}
function renderExistingBlocks(){const wrap=document.getElementById("existing-blocks-wrap"),list=document.getElementById("existing-blocks");const today=fmtD(new Date());const upcoming=blockEvents.filter(e=>e.date>=today).slice(0,20);wrap.style.display=upcoming.length?"block":"none";list.innerHTML="";const colors={Terra:"#c8a84b",Chase:"#4facfe",Family:"#34c759"};upcoming.forEach(ev=>{const color=colors[ev.member||""]||"#4facfe";const dt=new Date(ev.date+"T12:00:00");const dl=dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});const div=document.createElement("div");div.className="block-item";div.innerHTML=`<div style="width:3px;height:38px;border-radius:2px;background:${color};flex-shrink:0"></div><div class="block-item-info"><div class="block-who" style="color:${color}">${ev.member||""}</div><div class="block-time">Meeting Block · ${ev.time||""}</div><div class="block-date">${dl}</div></div><button class="block-rm" onclick="removeBlock('${ev.id}')">×</button>`;list.appendChild(div);});}
function removeBlock(id){db.ref("events/"+id).remove();}
function sync(){document.getElementById("sdot").className="sdot syn";document.getElementById("sdot-lbl").textContent="Saving…";}
function unsync(){document.getElementById("sdot").className="sdot ok";document.getElementById("sdot-lbl").textContent="Connected";}
function updateBadge(id,n){const el=document.getElementById(id);if(el)el.textContent=n;}
window.addEventListener("load",()=>{renderGroceryList();renderMeals();setTimeout(()=>document.getElementById("g-inp")?.focus(),300);});
</script>
